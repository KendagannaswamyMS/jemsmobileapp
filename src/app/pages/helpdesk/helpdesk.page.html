<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title>Help Desk</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="helpdesk-content ion-padding">

  <p class="section-label">Quick Access</p>

  <div class="feature-grid">

    <div class="feature-card" (click)="goTo('/tabs/my-tickets')">
      <div class="feature-icon-wrap tickets">
        <ion-icon name="ticket-outline"></ion-icon>
      </div>
      <div>
        <p class="feature-title">My Tickets</p>
        <p class="feature-sub">View & track your helpdesk support requests</p>
      </div>
      <ion-icon name="chevron-forward-outline" class="card-arrow"></ion-icon>
    </div>

  </div>

</ion-content>
